<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Air River AR</title>

<style>
:root{
    --camera-blur: 6px;      /* 背景ぼかしの強さ。0px〜12px程度で調整 */
    --camera-opacity: 1;     /* カメラ映像の透明度 */
}

html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#000;
    touch-action:none;
}

#stage{
    position:fixed;
    inset:0;
    overflow:hidden;
    background:#000;
}

#video,
#canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
}

#video{
    object-fit:cover;
    transform:scaleX(-1);
    opacity:var(--camera-opacity);
    filter:blur(var(--camera-blur)) brightness(0.95) saturate(0.9);
}

#canvas{
    z-index:2;
    pointer-events:none;
}

#startButton{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    z-index:10;
    padding:14px 22px;
    border:none;
    border-radius:999px;
    font-size:16px;
    color:white;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
}

#startButton.hidden{
    display:none;
}
</style>
</head>

<body>

<div id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<button id="startButton">Start Camera</button>

<script type="module">
import {
    HandLandmarker,
    FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const startButton = document.getElementById("startButton");

let handLandmarker = null;
let isPinching = false;
let smoothX = null;
let smoothY = null;
let lostFrames = 0;

const riverPath = [];

const swimmers = [
    { type:"fish", offset:0,   speed:0.72, size:1.00 },
    { type:"fish", offset:120, speed:0.58, size:0.82 },
    { type:"fish", offset:260, speed:0.88, size:0.68 }
];

// 将来的に追加しやすい構造。
// 例: {type:"leaf", offset:80, speed:0.5, size:1}
// 例: {type:"boat", offset:180, speed:0.35, size:1}

async function initCamera(){
    const stream = await navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:"user",
            width:{ideal:1280},
            height:{ideal:720}
        },
        audio:false
    });

    video.srcObject = stream;

    await new Promise(resolve=>{
        video.onloadedmetadata = resolve;
    });

    await video.play();
    resizeCanvas();
}

async function initHandTracking(){
    const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
    );

    handLandmarker = await HandLandmarker.createFromOptions(
        vision,
        {
            baseOptions:{
                modelAssetPath:
                "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
            },
            runningMode:"VIDEO",
            numHands:1,
            minHandDetectionConfidence:0.35,
            minHandPresenceConfidence:0.35,
            minTrackingConfidence:0.35
        }
    );
}

function resizeCanvas(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);

    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";

    ctx.setTransform(dpr,0,0,dpr,0,0);
}

function resetInputState(){
    smoothX = null;
    smoothY = null;
    lostFrames = 0;
    isPinching = false;
}

function pinchDetected(landmarks){
    const thumb = landmarks[4];
    const index = landmarks[8];

    const d = Math.hypot(
        thumb.x - index.x,
        thumb.y - index.y
    );

    if(isPinching){
        if(d > 0.12) isPinching = false;
    }else{
        if(d < 0.08) isPinching = true;
    }

    return isPinching;
}

function addRiverPoint(x,y){
    const last = riverPath[riverPath.length - 1];

    if(last){
        const dist = Math.hypot(x - last.x, y - last.y);

        if(dist < 2) return;

        const steps = Math.max(1, Math.floor(dist / 5));

        for(let i=1; i<=steps; i++){
            const t = i / steps;
            riverPath.push({
                x:last.x + (x - last.x) * t,
                y:last.y + (y - last.y) * t
            });
        }
    }else{
        riverPath.push({x,y});
    }

    if(riverPath.length > 7000){
        riverPath.splice(0, riverPath.length - 7000);
    }
}

function makeSmoothPath(points){
    if(points.length < 3) return points;

    const smoothed = [];
    smoothed.push(points[0]);

    for(let i=1; i<points.length-1; i++){
        const prev = points[i-1];
        const curr = points[i];
        const next = points[i+1];

        smoothed.push({
            x:(prev.x + curr.x * 2 + next.x) / 4,
            y:(prev.y + curr.y * 2 + next.y) / 4
        });
    }

    smoothed.push(points[points.length-1]);
    return smoothed;
}

function drawNaturalRiver(){
    if(riverPath.length < 2) return;

    const path = makeSmoothPath(riverPath);

    drawRiverStroke(path, 34, "rgba(170,225,255,0.22)");
    drawRiverStroke(path, 24, "rgba(90,185,255,0.48)");
    drawRiverStroke(path, 13, "rgba(40,145,230,0.92)");

    drawWaterHighlights(path);
}

function drawRiverStroke(path, width, color){
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);

    for(let i=1; i<path.length-1; i++){
        const curr = path[i];
        const next = path[i+1];

        const midX = (curr.x + next.x) / 2;
        const midY = (curr.y + next.y) / 2;

        ctx.quadraticCurveTo(curr.x, curr.y, midX, midY);
    }

    const last = path[path.length-1];
    ctx.lineTo(last.x,last.y);

    ctx.lineWidth = width;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = color;
    ctx.stroke();
}

function drawWaterHighlights(path){
    if(path.length < 20) return;

    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.strokeStyle = "rgba(230,250,255,0.55)";

    const time = performance.now() * 0.002;

    for(let i=10; i<path.length-10; i+=42){
        const p = path[i];
        const q = path[Math.min(i+6, path.length-1)];

        const wobble = Math.sin(time + i * 0.07) * 5;

        ctx.beginPath();
        ctx.moveTo(p.x + wobble, p.y - 4);
        ctx.quadraticCurveTo(
            (p.x + q.x) / 2,
            (p.y + q.y) / 2 - 8,
            q.x - wobble,
            q.y - 4
        );
        ctx.stroke();
    }

    ctx.restore();
}

function getPointOnRiver(offset){
    if(riverPath.length < 2) return null;

    const i = Math.floor(offset) % (riverPath.length - 1);
    const p = riverPath[i];
    const next = riverPath[i + 1];

    const angle = Math.atan2(
        next.y - p.y,
        next.x - p.x
    );

    return {p,next,angle,index:i};
}

function updateSwimmers(){
    if(riverPath.length < 25) return;

    for(const s of swimmers){
        s.offset += s.speed;

        if(s.offset >= riverPath.length - 2){
            s.offset = 0;
        }

        const pos = getPointOnRiver(s.offset);
        if(!pos) continue;

        if(s.type === "fish"){
            drawVectorFish(pos.p.x, pos.p.y, pos.angle, s.size);
        }else if(s.type === "leaf"){
            drawLeaf(pos.p.x, pos.p.y, pos.angle, s.size);
        }else if(s.type === "boat"){
            drawBoat(pos.p.x, pos.p.y, pos.angle, s.size);
        }
    }
}

function drawVectorFish(x,y,angle,scale=1){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.scale(scale,scale);

    ctx.fillStyle = "rgba(255,178,72,0.96)";
    ctx.beginPath();
    ctx.ellipse(0,0,15,8.5,0,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "rgba(255,132,50,0.95)";
    ctx.beginPath();
    ctx.moveTo(-13,0);
    ctx.lineTo(-25,-8);
    ctx.lineTo(-25,8);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(255,240,190,0.75)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-4,-7);
    ctx.quadraticCurveTo(2,0,-4,7);
    ctx.stroke();

    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.arc(8,-2.2,1.8,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function drawLeaf(x,y,angle,scale=1){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle + Math.sin(performance.now()*0.003)*0.4);
    ctx.scale(scale,scale);

    ctx.fillStyle = "rgba(90,190,95,0.85)";
    ctx.beginPath();
    ctx.ellipse(0,0,11,5,0,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = "rgba(230,255,220,0.6)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-8,0);
    ctx.lineTo(8,0);
    ctx.stroke();

    ctx.restore();
}

function drawBoat(x,y,angle,scale=1){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.scale(scale,scale);

    ctx.fillStyle = "rgba(130,80,45,0.9)";
    ctx.beginPath();
    ctx.moveTo(-16,-5);
    ctx.lineTo(16,-5);
    ctx.lineTo(9,6);
    ctx.lineTo(-9,6);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "rgba(255,245,210,0.9)";
    ctx.beginPath();
    ctx.moveTo(0,-6);
    ctx.lineTo(0,-22);
    ctx.lineTo(11,-8);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

function detectHandAndDraw(){
    if(!handLandmarker) return;

    const result = handLandmarker.detectForVideo(
        video,
        performance.now()
    );

    if(result.landmarks.length){
        lostFrames = 0;

        const landmarks = result.landmarks[0];
        const tip = landmarks[8];

        const x = window.innerWidth - tip.x * window.innerWidth;
        const y = tip.y * window.innerHeight;

        if(smoothX === null){
            smoothX = x;
            smoothY = y;
        }else{
            smoothX = smoothX * 0.92 + x * 0.08;
            smoothY = smoothY * 0.92 + y * 0.08;
        }

        if(pinchDetected(landmarks)){
            addRiverPoint(smoothX, smoothY);
        }

    }else{
        lostFrames++;

        if(lostFrames > 18){
            resetInputState();
        }
    }
}

function render(){
    ctx.clearRect(0,0,window.innerWidth,window.innerHeight);

    detectHandAndDraw();
    drawNaturalRiver();
    updateSwimmers();

    requestAnimationFrame(render);
}

function clearRiver(){
    riverPath.length = 0;
    resetInputState();

    for(let i=0; i<swimmers.length; i++){
        swimmers[i].offset = i * 120;
    }
}

window.addEventListener("resize", resizeCanvas);

window.addEventListener("keydown",(e)=>{
    if(e.key === "c" || e.key === "C"){
        clearRiver();
    }
});

window.addEventListener("touchstart",(e)=>{
    if(e.touches.length >= 3){
        clearRiver();
    }
},{passive:true});

async function start(){
    try{
        startButton.classList.add("hidden");
        await initCamera();
        await initHandTracking();
        render();
    }catch(error){
        console.error(error);
        startButton.classList.remove("hidden");
        startButton.textContent = "Camera Error / Retry";
    }
}

startButton.addEventListener("click", start);

if(!/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)){
    start();
}
</script>
</body>
</html>
