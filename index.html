<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air River</title>
<style>
html,body{margin:0;overflow:hidden;background:#00111f}
#video,#canvas{position:absolute;top:0;left:0}
#video{transform:scaleX(-1);opacity:.15}
#info{
position:absolute;top:10px;left:10px;z-index:10;
color:white;background:rgba(0,0,0,.5);
padding:10px;border-radius:8px;font-family:sans-serif}
</style>
</head>
<body>
<div id="info">
🤏 ピンチで川を描く<br>
🐟 魚が川を泳ぐ<br>
⌨ Cキーでリセット
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script type="module">
import {
  HandLandmarker,
  FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let handLandmarker;
let isPinching = false;
let smoothX=null, smoothY=null;
let lostFrames=0;

const riverPath=[];

const fishes=[
 {offset:0,speed:0.6},
 {offset:120,speed:0.8},
 {offset:240,speed:0.7}
];

async function initCamera(){
 const stream=await navigator.mediaDevices.getUserMedia({video:true});
 video.srcObject=stream;
 await new Promise(r=>video.onloadedmetadata=r);
 await video.play();

 canvas.width=video.videoWidth;
 canvas.height=video.videoHeight;
}

async function initHandTracking(){
 const vision=await FilesetResolver.forVisionTasks(
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
 );

 handLandmarker=await HandLandmarker.createFromOptions(
  vision,
  {
   baseOptions:{
    modelAssetPath:
    "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
   },
   runningMode:"VIDEO",
   numHands:1
  }
 );
}

function pinchDetected(landmarks){
 const thumb=landmarks[4];
 const index=landmarks[8];

 const d=Math.hypot(
  thumb.x-index.x,
  thumb.y-index.y
 );

 if(isPinching){
  if(d>0.12) isPinching=false;
 }else{
  if(d<0.08) isPinching=true;
 }

 return isPinching;
}

function drawRiver(){

 if(riverPath.length<2) return;

 ctx.beginPath();
 ctx.moveTo(riverPath[0].x, riverPath[0].y);

 for(let i=1;i<riverPath.length;i++){
  ctx.lineTo(riverPath[i].x, riverPath[i].y);
 }

 ctx.lineWidth=28;
 ctx.strokeStyle="rgba(120,200,255,0.35)";
 ctx.lineCap="round";
 ctx.lineJoin="round";
 ctx.stroke();

 ctx.beginPath();
 ctx.moveTo(riverPath[0].x, riverPath[0].y);

 for(let i=1;i<riverPath.length;i++){
  ctx.lineTo(riverPath[i].x, riverPath[i].y);
 }

 ctx.lineWidth=16;
 ctx.strokeStyle="rgba(70,170,255,0.95)";
 ctx.lineCap="round";
 ctx.lineJoin="round";
 ctx.stroke();
}

function drawFish(x,y,angle){

 ctx.save();
 ctx.translate(x,y);
 ctx.rotate(angle);

 ctx.fillStyle="#ffb347";
 ctx.beginPath();
 ctx.ellipse(0,0,16,10,0,0,Math.PI*2);
 ctx.fill();

 ctx.beginPath();
 ctx.moveTo(-14,0);
 ctx.lineTo(-26,-8);
 ctx.lineTo(-26,8);
 ctx.closePath();
 ctx.fill();

 ctx.fillStyle="#000";
 ctx.beginPath();
 ctx.arc(8,-2,1.8,0,Math.PI*2);
 ctx.fill();

 ctx.restore();
}

function updateFish(){

 if(riverPath.length<20) return;

 for(const fish of fishes){

  fish.offset += fish.speed;

  if(fish.offset >= riverPath.length-2){
   fish.offset = 0;
  }

  const i=Math.floor(fish.offset);

  const p=riverPath[i];
  const next=riverPath[Math.min(i+1, riverPath.length-1)];

  const angle=Math.atan2(
   next.y-p.y,
   next.x-p.x
  );

  drawFish(p.x,p.y,angle);
 }
}

function render(){

 ctx.clearRect(0,0,canvas.width,canvas.height);

 const result=handLandmarker.detectForVideo(
  video,
  performance.now()
 );

 if(result.landmarks.length){

  lostFrames=0;

  const landmarks=result.landmarks[0];
  const tip=landmarks[8];

  const x=canvas.width-(tip.x*canvas.width);
  const y=tip.y*canvas.height;

  if(smoothX===null){
   smoothX=x;
   smoothY=y;
  }else{
   smoothX=smoothX*0.93+x*0.07;
   smoothY=smoothY*0.93+y*0.07;
  }

  if(pinchDetected(landmarks)){

   riverPath.push({
    x:smoothX,
    y:smoothY
   });

   if(riverPath.length>5000){
    riverPath.shift();
   }

  }

 }else{
  lostFrames++;
 }

 drawRiver();
 updateFish();

 requestAnimationFrame(render);
}

window.addEventListener("keydown",(e)=>{

 if(e.key==="c" || e.key==="C"){
  riverPath.length=0;
 }
});

async function start(){
 await initCamera();
 await initHandTracking();
 render();
}

start();
</script>
</body>
</html>
