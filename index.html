<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Air River AR</title>

<style>
:root{
    --camera-blur: 6px;
    --camera-opacity: 1;
}

html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#000;
    touch-action:none;
}

#stage{
    position:fixed;
    inset:0;
    overflow:hidden;
    background:#000;
}

#video,
#canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
}

#video{
    object-fit:cover;
    transform:scaleX(-1);
    opacity:var(--camera-opacity);
    filter:blur(var(--camera-blur)) brightness(0.95) saturate(0.9);
}

#canvas{
    z-index:2;
    pointer-events:none;
}

#startButton{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    z-index:10;
    padding:14px 22px;
    border:none;
    border-radius:999px;
    font-size:16px;
    color:white;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
}

#startButton.hidden{
    display:none;
}
</style>
</head>

<body>

<div id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<button id="startButton">Start Camera</button>

<script type="module">
import {
    HandLandmarker,
    FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const startButton = document.getElementById("startButton");

let handLandmarker = null;

let isPinching = false;
let wasPinching = false;

let smoothX = null;
let smoothY = null;
let lostFrames = 0;

let typedBuffer = "";

const riverPath = [];
const swimmers = [];

/*
  入力ワード辞書。
  例：
  fish3 + Enter   → 魚3匹
  duck2 + Enter   → アヒル2羽
  leaf5 + Enter   → 葉っぱ5枚
  star4 + Enter   → 星4つ
  apple2 + Enter  → りんご2つ
*/
const wordMap = {
    fish:"fish",
    fishes:"fish",
    koi:"fish",
    salmon:"fish",

    ship:"ship",
    boat:"ship",
    yacht:"ship",

    flower:"flower",
    rose:"flower",
    sakura:"flower",

    leaf:"leaf",
    leaves:"leaf",

    duck:"duck",
    bird:"bird",

    star:"star",
    moon:"moon",

    apple:"apple",
    orange:"orange"
};

async function initCamera(){
    const stream = await navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:"user",
            width:{ideal:1280},
            height:{ideal:720}
        },
        audio:false
    });

    video.srcObject = stream;

    await new Promise(resolve=>{
        video.onloadedmetadata = resolve;
    });

    await video.play();
    resizeCanvas();
}

async function initHandTracking(){
    const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm"
    );

    handLandmarker = await HandLandmarker.createFromOptions(
        vision,
        {
            baseOptions:{
                modelAssetPath:
                "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
            },
            runningMode:"VIDEO",
            numHands:1,
            minHandDetectionConfidence:0.35,
            minHandPresenceConfidence:0.35,
            minTrackingConfidence:0.35
        }
    );
}

function resizeCanvas(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);

    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";

    ctx.setTransform(dpr,0,0,dpr,0,0);
}

function resetInputState(){
    smoothX = null;
    smoothY = null;
    lostFrames = 0;
    isPinching = false;
    wasPinching = false;
}

function pinchDetected(landmarks){
    const thumb = landmarks[4];
    const index = landmarks[8];

    const d = Math.hypot(
        thumb.x - index.x,
        thumb.y - index.y
    );

    if(isPinching){
        if(d > 0.12) isPinching = false;
    }else{
        if(d < 0.08) isPinching = true;
    }

    return isPinching;
}

function addRiverPoint(x,y,forceNewStart=false){
    const last = riverPath[riverPath.length - 1];

    if(forceNewStart || !last){
        riverPath.push({
            x,
            y,
            breakBefore:true
        });
        return;
    }

    const dist = Math.hypot(x - last.x, y - last.y);

    if(dist < 2) return;

    const steps = Math.max(1, Math.floor(dist / 5));

    for(let i=1; i<=steps; i++){
        const t = i / steps;
        riverPath.push({
            x:last.x + (x - last.x) * t,
            y:last.y + (y - last.y) * t,
            breakBefore:false
        });
    }

    if(riverPath.length > 7000){
        riverPath.splice(0, riverPath.length - 7000);
    }
}

function makeSmoothPath(points){
    if(points.length < 3) return points;

    const smoothed = [];
    smoothed.push(points[0]);

    for(let i=1; i<points.length-1; i++){
        const prev = points[i-1];
        const curr = points[i];
        const next = points[i+1];

        if(curr.breakBefore || next.breakBefore){
            smoothed.push(curr);
            continue;
        }

        smoothed.push({
            x:(prev.x + curr.x * 2 + next.x) / 4,
            y:(prev.y + curr.y * 2 + next.y) / 4,
            breakBefore:false
        });
    }

    smoothed.push(points[points.length-1]);
    return smoothed;
}

function drawNaturalRiver(){
    if(riverPath.length < 2) return;

    const path = makeSmoothPath(riverPath);

    drawRiverStroke(path, 34, "rgba(170,225,255,0.22)");
    drawRiverStroke(path, 24, "rgba(90,185,255,0.48)");
    drawRiverStroke(path, 13, "rgba(40,145,230,0.92)");

    // 白い水面ラインは削除しました。
}

function drawRiverStroke(path, width, color){
    ctx.beginPath();

    let hasAnySegment = false;

    for(let i=0; i<path.length; i++){
        const p = path[i];

        if(i === 0 || p.breakBefore){
            ctx.moveTo(p.x, p.y);
            continue;
        }

        const prev = path[i - 1];

        if(prev.breakBefore){
            ctx.moveTo(prev.x, prev.y);
            ctx.lineTo(p.x, p.y);
            hasAnySegment = true;
            continue;
        }

        const next = path[i + 1];

        if(next && !next.breakBefore){
            const midX = (p.x + next.x) / 2;
            const midY = (p.y + next.y) / 2;
            ctx.quadraticCurveTo(p.x, p.y, midX, midY);
        }else{
            ctx.lineTo(p.x, p.y);
        }

        hasAnySegment = true;
    }

    if(!hasAnySegment) return;

    ctx.lineWidth = width;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = color;
    ctx.stroke();
}

function drawPinchPen(x,y){
    ctx.save();

    ctx.translate(x,y);

    ctx.fillStyle = "rgba(255,255,255,0.92)";
    ctx.strokeStyle = "rgba(40,145,230,0.95)";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.arc(0,0,9,0,Math.PI*2);
    ctx.fill();
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(-14,0);
    ctx.lineTo(14,0);
    ctx.moveTo(0,-14);
    ctx.lineTo(0,14);
    ctx.stroke();

    ctx.restore();
}

function getDrawableSegments(){
    const segments = [];
    let segment = [];

    for(const p of riverPath){
        if(p.breakBefore){
            if(segment.length > 1) segments.push(segment);
            segment = [p];
        }else{
            segment.push(p);
        }
    }

    if(segment.length > 1) segments.push(segment);

    return segments;
}

function flattenRiverForTravel(){
    const result = [];
    const segments = getDrawableSegments();

    for(const segment of segments){
        for(let i=0; i<segment.length-1; i++){
            result.push({
                p:segment[i],
                next:segment[i+1]
            });
        }
    }

    return result;
}

function getPointOnRiver(offset){
    const travel = flattenRiverForTravel();

    if(travel.length < 1) return null;

    const idx = Math.floor(offset);

    if(idx >= travel.length) return null;

    const item = travel[idx];
    const p = item.p;
    const next = item.next;

    const angle = Math.atan2(
        next.y - p.y,
        next.x - p.x
    );

    return {p,next,angle,max:travel.length};
}

function addSwimmer(type,count=1){
    const travel = flattenRiverForTravel();
    if(travel.length < 2) return;

    count = Math.max(1, Math.min(80, count));

    for(let i=0; i<count; i++){
        const base = {
            type,
            offset: -i * 30,
            alive:true,
            size:1,
            spin:Math.random() * Math.PI * 2
        };

        if(type === "fish"){
            base.speed = 0.78 + Math.random() * 0.25;
            base.size = 0.75 + Math.random() * 0.35;
        }else if(type === "ship"){
            base.speed = 0.42 + Math.random() * 0.16;
            base.size = 0.95 + Math.random() * 0.25;
        }else if(type === "flower"){
            base.speed = 0.28 + Math.random() * 0.18;
            base.size = 0.75 + Math.random() * 0.35;
        }else{
            base.speed = 0.35 + Math.random() * 0.25;
            base.size = 0.8 + Math.random() * 0.3;
        }

        swimmers.push(base);
    }
}

function updateSwimmers(){
    if(riverPath.length < 3) return;

    for(const s of swimmers){
        if(!s.alive) continue;

        s.offset += s.speed;

        if(s.offset < 0) continue;

        const pos = getPointOnRiver(s.offset);

        if(!pos){
            s.alive = false;
            continue;
        }

        drawObjectByType(s.type,pos.p.x,pos.p.y,pos.angle,s.size,s.spin);
        s.spin += 0.035;
    }

    for(let i=swimmers.length-1; i>=0; i--){
        if(!swimmers[i].alive){
            swimmers.splice(i,1);
        }
    }
}

function drawObjectByType(type,x,y,angle,scale,spin){
    if(type === "fish") drawVectorFish(x,y,angle,scale);
    else if(type === "ship") drawShip(x,y,angle,scale);
    else if(type === "flower") drawFlower(x,y,angle,scale,spin);
    else if(type === "leaf") drawLeaf(x,y,angle,scale,spin);
    else if(type === "duck") drawDuck(x,y,angle,scale);
    else if(type === "bird") drawBird(x,y,angle,scale);
    else if(type === "star") drawStar(x,y,angle,scale,spin);
    else if(type === "moon") drawMoon(x,y,angle,scale);
    else if(type === "apple") drawApple(x,y,angle,scale);
    else if(type === "orange") drawOrange(x,y,angle,scale);
    else drawCircleObject(x,y,angle,scale);
}

function drawVectorFish(x,y,angle,scale=1){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.scale(scale,scale);

    ctx.fillStyle = "rgba(255,178,72,0.96)";
    ctx.beginPath();
    ctx.ellipse(0,0,15,8.5,0,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "rgba(255,132,50,0.95)";
    ctx.beginPath();
    ctx.moveTo(-13,0);
    ctx.lineTo(-25,-8);
    ctx.lineTo(-25,8);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(255,240,190,0.75)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-4,-7);
    ctx.quadraticCurveTo(2,0,-4,7);
    ctx.stroke();

    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.arc(8,-2.2,1.8,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function drawShip(x,y,angle,scale=1){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.scale(scale,scale);

    ctx.fillStyle = "rgba(120,75,42,0.95)";
    ctx.beginPath();
    ctx.moveTo(-21,-5);
    ctx.lineTo(21,-5);
    ctx.lineTo(13,8);
    ctx.lineTo(-13,8);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "rgba(255,245,210,0.96)";
    ctx.beginPath();
    ctx.moveTo(0,-7);
    ctx.lineTo(0,-27);
    ctx.lineTo(15,-8);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(80,45,25,0.9)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0,-7);
    ctx.lineTo(0,-27);
    ctx.stroke();

    ctx.restore();
}

function drawFlower(x,y,angle,scale=1,spin=0){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle + spin);
    ctx.scale(scale,scale);

    for(let i=0; i<6; i++){
        const a = i * Math.PI * 2 / 6;
        ctx.save();
        ctx.rotate(a);
        ctx.fillStyle = "rgba(255,135,190,0.92)";
        ctx.beginPath();
        ctx.ellipse(0,-10,5,9,0,0,Math.PI*2);
        ctx.fill();
        ctx.restore();
    }

    ctx.fillStyle = "rgba(255,220,70,0.95)";
    ctx.beginPath();
    ctx.arc(0,0,5,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function drawLeaf(x,y,angle,scale=1,spin=0){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle + Math.sin(spin)*0.7);
    ctx.scale(scale,scale);

    ctx.fillStyle = "rgba(90,190,95,0.88)";
    ctx.beginPath();
    ctx.ellipse(0,0,13,6,0,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = "rgba(230,255,220,0.7)";
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-10,0);
    ctx.lineTo(10,0);
    ctx.stroke();

    ctx.restore();
}

function drawDuck(x,y,angle,scale=1){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.scale(scale,scale);

    ctx.fillStyle = "rgba(255,220,60,0.95)";
    ctx.beginPath();
    ctx.ellipse(0,3,15,9,0,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(10,-7,7,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "rgba(255,125,40,0.95)";
    ctx.beginPath();
    ctx.moveTo(16,-7);
    ctx.lineTo(25,-10);
    ctx.lineTo(25,-4);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.arc(12,-9,1.5,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function drawBird(x,y,angle,scale=1){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.scale(scale,scale);

    ctx.strokeStyle = "rgba(245,245,255,0.95)";
    ctx.lineWidth = 3;
    ctx.lineCap = "round";

    ctx.beginPath();
    ctx.moveTo(-14,0);
    ctx.quadraticCurveTo(-6,-10,0,0);
    ctx.quadraticCurveTo(6,-10,14,0);
    ctx.stroke();

    ctx.restore();
}

function drawStar(x,y,angle,scale=1,spin=0){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(spin);
    ctx.scale(scale,scale);

    ctx.fillStyle = "rgba(255,230,80,0.95)";
    ctx.beginPath();

    for(let i=0; i<10; i++){
        const r = i % 2 === 0 ? 14 : 6;
        const a = -Math.PI/2 + i * Math.PI / 5;
        const px = Math.cos(a) * r;
        const py = Math.sin(a) * r;
        if(i === 0) ctx.moveTo(px,py);
        else ctx.lineTo(px,py);
    }

    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

function drawMoon(x,y,angle,scale=1){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.scale(scale,scale);

    ctx.fillStyle = "rgba(245,240,180,0.95)";
    ctx.beginPath();
    ctx.arc(0,0,14,0,Math.PI*2);
    ctx.fill();

    ctx.globalCompositeOperation = "destination-out";
    ctx.beginPath();
    ctx.arc(6,-3,14,0,Math.PI*2);
    ctx.fill();

    ctx.globalCompositeOperation = "source-over";

    ctx.restore();
}

function drawApple(x,y,angle,scale=1){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.scale(scale,scale);

    ctx.fillStyle = "rgba(220,40,55,0.95)";
    ctx.beginPath();
    ctx.arc(-5,2,9,0,Math.PI*2);
    ctx.arc(5,2,9,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = "rgba(100,60,20,0.95)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0,-8);
    ctx.lineTo(3,-16);
    ctx.stroke();

    ctx.fillStyle = "rgba(60,170,80,0.9)";
    ctx.beginPath();
    ctx.ellipse(8,-13,7,3,0.3,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function drawOrange(x,y,angle,scale=1){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.scale(scale,scale);

    ctx.fillStyle = "rgba(255,145,40,0.96)";
    ctx.beginPath();
    ctx.arc(0,0,13,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "rgba(255,190,80,0.65)";
    ctx.beginPath();
    ctx.arc(-4,-5,4,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function drawCircleObject(x,y,angle,scale=1){
    ctx.save();
    ctx.translate(x,y);
    ctx.scale(scale,scale);

    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.beginPath();
    ctx.arc(0,0,10,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function detectHandAndDraw(){
    if(!handLandmarker) return;

    const result = handLandmarker.detectForVideo(
        video,
        performance.now()
    );

    if(result.landmarks.length){
        lostFrames = 0;

        const landmarks = result.landmarks[0];
        const tip = landmarks[8];

        const rawX = window.innerWidth - tip.x * window.innerWidth;
        const rawY = tip.y * window.innerHeight;

        const pinchingNow = pinchDetected(landmarks);
        const newPinchStart = pinchingNow && !wasPinching;

        if(newPinchStart){
            smoothX = rawX;
            smoothY = rawY;
        }else if(smoothX === null){
            smoothX = rawX;
            smoothY = rawY;
        }else{
            smoothX = smoothX * 0.92 + rawX * 0.08;
            smoothY = smoothY * 0.92 + rawY * 0.08;
        }

        if(pinchingNow){
            drawPinchPen(smoothX, smoothY);

            addRiverPoint(
                smoothX,
                smoothY,
                newPinchStart
            );
        }

        wasPinching = pinchingNow;

    }else{
        lostFrames++;

        if(lostFrames > 18){
            resetInputState();
        }
    }
}

function render(){
    ctx.clearRect(0,0,window.innerWidth,window.innerHeight);

    detectHandAndDraw();
    drawNaturalRiver();
    updateSwimmers();

    requestAnimationFrame(render);
}

function clearRiver(){
    riverPath.length = 0;
    swimmers.length = 0;
    resetInputState();
}

function parseCommand(buffer){
    const match = buffer.match(/^([a-zA-Z]+)(\d+)$/);

    if(!match) return null;

    const word = match[1].toLowerCase();
    const count = parseInt(match[2],10);

    const type = wordMap[word];

    if(!type) return null;

    return {
        type,
        count
    };
}

function handleTypedCommand(key){
    if(key === "Backspace"){
        typedBuffer = typedBuffer.slice(0,-1);
        return;
    }

    if(key === "Enter" || key === " "){
        const command = parseCommand(typedBuffer);

        if(command){
            addSwimmer(command.type, command.count);
        }

        typedBuffer = "";
        return;
    }

    if(key.length !== 1 || !/[a-zA-Z0-9]/.test(key)) return;

    typedBuffer += key.toLowerCase();

    if(typedBuffer.length > 24){
        typedBuffer = typedBuffer.slice(-24);
    }
}

window.addEventListener("resize", resizeCanvas);

window.addEventListener("keydown",(e)=>{
    if(e.key === "c" || e.key === "C"){
        clearRiver();
        typedBuffer = "";
        return;
    }

    handleTypedCommand(e.key);
});

window.addEventListener("touchstart",(e)=>{
    if(e.touches.length >= 3){
        clearRiver();
    }
},{passive:true});

async function start(){
    try{
        startButton.classList.add("hidden");
        await initCamera();
        await initHandTracking();
        render();
    }catch(error){
        console.error(error);
        startButton.classList.remove("hidden");
        startButton.textContent = "Camera Error / Retry";
    }
}

startButton.addEventListener("click", start);

if(!/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)){
    start();
}
</script>
</body>
</html>
